services:
  db:
    image: postgres:15-alpine
    container_name: tech_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-tech_news}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-user} -d ${DB_NAME:-tech_news}"]
      interval: 5s
      timeout: 5s
      retries: 5

  content:
    build: ./content
    container_name: tech_backend
    depends_on:
      db:
        condition: service_healthy
    env_file: ./content/.env
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?schema=public
    ports:
      - "3001:3001"

  web:
    build: ./web
    container_name: tech_frontend
    depends_on:
      - content
    ports:
      - "3000:3000"
